hostname XR1
username admin
 group root-lr
 group cisco-support
 password cisco!123
ssh server v2
line console
 exec-timeout 0 0
!
interface MgmtEth0/RP0/CPU0/0
 ipv4 address dhcp
 no shutdown
!
interface GigabitEthernet0/0/0/0
 description Link to Huawei VRP
 ipv4 address 192.0.2.1 255.255.255.0
 no shutdown
!
router ospf 1
 area 0
  interface GigabitEthernet0/0/0/0
!
