name: l3vpn

topology:
  kinds:
    cisco_xrd:
      image: ios-xr/xrd-control-plane:7.9.2
  nodes:
    PE1:
      kind: cisco_xrd
      startup-config: config/PE1.txt
    PE2:
      kind: cisco_xrd
      startup-config: config/PE2.txt
    CE1:
      kind: cisco_xrd
      startup-config: config/CE1.txt
    CE2:
      kind: cisco_xrd
      startup-config: config/CE2.txt
    CE3:
      kind: cisco_xrd
      startup-config: config/CE3.txt
  links:
    - endpoints: ["PE1:Gi0-0-0-0", "PE2:Gi0-0-0-0"]
    - endpoints: ["PE1:Gi0-0-0-1", "CE1:Gi0-0-0-0"]
    - endpoints: ["PE2:Gi0-0-0-1", "CE2:Gi0-0-0-0"]
    - endpoints: ["PE2:Gi0-0-0-2", "CE3:Gi0-0-0-0"]
